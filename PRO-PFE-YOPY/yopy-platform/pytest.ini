[pytest]
# Test discovery patterns for pytest
python_files = test_*.py *test.py Test*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests/rahma

# Add current directory to Python path for imports
pythonpath = .

# Show extra test summary info
addopts = -v --tb=short

# Ignore certain directories
norecursedirs = .git .venv node_modules vendor coverage

# Markers for test categorization (optional)
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
